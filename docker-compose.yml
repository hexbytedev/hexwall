name: hexwall
services:
  hexwall_app:
    # trixie is required for GLIBC_2.39
    image: golang:1.26.3-trixie
    container_name: hexwall_app
    working_dir: /app
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    init: true
    # monitor IPs
    network_mode: host
    # monitor which applications are using which sockets:
    # pid, SYS_PTRACE, apparmor=unconfined
    pid: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    entrypoint:
      - /app/hexwall
    command:
      - --db
      - /etc/pihole/pihole-FTL.db
      - --hexwall-db
      - /app/hexwall.db
      - --mode
      - ${HEXWALL_GUARD_MODE:-watch}
    volumes:
      - ./app:/app
      - ${SOMO_BINARY:-/usr/local/bin/somo}:/usr/local/bin/somo:ro
      - ${PIHOLE_DB_DIR:-/etc/pihole}:/etc/pihole:ro

# ./hexwall --hexwall-db hexwall.db --db /etc/pihole/pihole-FTL.db --mode watch -debug
